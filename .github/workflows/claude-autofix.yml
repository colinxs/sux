name: Claude autofix CI

# When CI fails on a PR, Claude reads the failure and pushes a fix to the PR branch; CI
# re-runs and, if green, the already-enabled native auto-merge (automerge.yml) merges it —
# fully async, no human. Bounded (safe-type PRs only, attempt cap, --max-turns). Inert until
# CLAUDE_CODE_OAUTH_TOKEN is set (subscription, via claude setup-token).
# Reusable workflow: SuxOS/.github/.github/workflows/claude-autofix.yml

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  autofix:
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    uses: SuxOS/.github/.github/workflows/claude-autofix.yml@main
    secrets: inherit
