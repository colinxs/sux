name: Fixer

# Proposer stage: scans this repo, files bugs/features as issues with confidence labels.
# Never opens a PR, never queues for build (triage.yml decides that). Runs on the Claude
# Pro/Max subscription (CLAUDE_CODE_OAUTH_TOKEN), not a metered API key.
# Reusable workflow: SuxOS/.github/.github/workflows/fixer.yml — see its design doc.

on:
  schedule:
    - cron: "17 8 * * *" # daily, off-minute; scans on a cadence
  workflow_dispatch:

jobs:
  fixer:
    uses: SuxOS/.github/.github/workflows/fixer.yml@main
    secrets: inherit
