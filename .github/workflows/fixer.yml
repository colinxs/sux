name: Fixer

# Proposer stage: scans this repo, files bugs/features as issues with confidence labels.
# Never opens a PR, never queues for build (triage.yml decides that). Runs on the Claude
# Pro/Max subscription (CLAUDE_CODE_OAUTH_TOKEN), not a metered API key.
# Reusable workflow: SuxOS/.github/.github/workflows/fixer.yml — see its design doc.

on:
  schedule:
    # Deep tier of the 3-cadence proposer (see fixer-bugs.yml 15m / fixer-hourly.yml 30m):
    # bugs + feature ideas + an explicit push for at least one ambitious/large idea per pass.
    - cron: "23 * * * *"
  workflow_dispatch:

jobs:
  fixer:
    # Default GITHUB_TOKEN perms are read-only; a reusable requesting more than the caller
    # grants fails at startup. Grant exactly what fixer.yml needs.
    permissions:
      contents: read
      issues: write
      id-token: write
    uses: SuxOS/.github/.github/workflows/fixer.yml@main
    with:
      # Default (25) is tuned for a quick scan; a full-repo sweep across this many fns/docs
      # routinely needs more turns to read broadly before it can propose anything (observed:
      # 2026-07-14 dispatch hit the cap with zero issues filed).
      max-turns: 40
      scope: deep
    secrets: inherit
