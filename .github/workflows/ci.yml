name: CI

# Runs on every pull request (pre-merge gate on the branch), on push to `main`
# (post-merge / auto-deploy guard), and on merge_group so the "Type-check & build"
# required check reports on the queue's speculative ref — without it the merge queue
# would freeze waiting forever. Push is scoped to `main` so a feature branch isn't
# double-run (once on push, again on its PR); the PR already covers pre-merge.
on:
  push:
    branches: [main]
  pull_request:
  merge_group:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Type-check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Test
        run: npm test

      # The installer (root@192.168.1.1) embeds node/server.mjs as a base64 blob;
      # this fails if it has drifted from server.mjs (fix: npm run build:node).
      # Guards against shipping a stale residential node — how the binary-egress
      # bug hid: the blob and its source had silently diverged.
      - name: Node deploy blob in sync
        run: npm run check:node

      # The generated fn manifest (index.ts) must include every fns/*.ts
      # (fix: npm run gen:index) — a new fn that isn't registered ships silently.
      - name: Function index in sync
        run: npm run gen:index && git diff --exit-code sux/src/fns/index.ts

      # The pre-commit hook regenerates+stages the wiki (Functions-MOC, Status-Dashboard,
      # llms.txt) but no-ops without npm (rebase-bot / odd env), so a hook-bypassing commit
      # can land drifted wiki. gen-wiki --check is the CI backstop.
      - name: Wiki in sync
        run: npm run check:wiki

      # Namespace dispatcher (vault/mail/files/calendar/contact) description strings carry
      # worked example calls like verb({action:'x', param}) — these have drifted from the
      # real target tool's inputSchema before (#202, #205, #206) and silently misled callers.
      - name: Dispatcher doc-example params match real schemas
        run: npm run lint:dispatcher-docs

      # Validates the Worker bundles & config are deployable without deploying.
      - name: Build (dry-run deploy)
        run: npx wrangler deploy --dry-run --config sux/wrangler.jsonc
