name: CI

# Triggers on every push and pull request (all branches) — fails on any error.
# Also runs on merge_group so the "Type-check & build" required check reports on the
# queue's speculative ref; without it the merge queue would freeze waiting forever.
# The push trigger EXCLUDES the queue's synthetic gh-readonly-queue/** branches: the
# merge_group run already covers that ref, and letting push also fire there would share
# the ref-keyed, cancel-in-progress concurrency group and cancel the merge_group run —
# a cancelled required check stalls the queue.
on:
  push:
    branches-ignore:
      - "gh-readonly-queue/**"
  pull_request:
  merge_group:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Type-check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      # package.json depends on "@suxos/lib": "file:../suxlib" — a PRIVATE sibling
      # repo, not a submodule of this one, so a clean runner has no ../suxlib and
      # `npm ci` fails resolving the file: dep. Mint a token scoped to just that
      # repo (read-only) from the same App identity automerge.yml already uses.
      - name: Mint app token for suxlib (private sibling dependency)
        id: suxlib-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.SUX_BOT_APP_ID }}
          private-key: ${{ secrets.SUX_BOT_PRIVATE_KEY }}
          owner: SuxOS
          repositories: suxlib
          permission-contents: read

      # $GITHUB_WORKSPACE is .../work/sux/sux, so ../suxlib lands at .../work/sux/suxlib
      # — exactly where npm's file:../suxlib resolution looks.
      - name: Clone suxlib (private sibling dependency)
        env:
          SUXLIB_TOKEN: ${{ steps.suxlib-token.outputs.token }}
        run: |
          git clone --depth 1 --branch main "https://x-access-token:${SUXLIB_TOKEN}@github.com/SuxOS/suxlib.git" ../suxlib
          npm --prefix ../suxlib ci --omit=dev   # install suxlib's own deps (fflate) so sux's tsc can resolve them through the file: dep

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Test
        run: npm test

      # The installer (root@192.168.1.1) embeds node/server.mjs as a base64 blob;
      # this fails if it has drifted from server.mjs (fix: npm run build:node).
      # Guards against shipping a stale residential node — how the binary-egress
      # bug hid: the blob and its source had silently diverged.
      - name: Node deploy blob in sync
        run: npm run check:node

      # sux/wrangler.jsonc's compatibility_date/compatibility_flags must stay mirrored in
      # test/e2e/wrangler.e2e.jsonc — otherwise e2e silently validates against a stale
      # Workers runtime baseline and skips flags like global_fetch_strictly_public (#607, #610).
      - name: Wrangler compat_date/flags in sync (prod vs e2e)
        run: npm run check:wrangler-compat

      # The generated fn manifest (index.ts) must include every fns/*.ts
      # (fix: npm run gen:index) — a new fn that isn't registered ships silently.
      - name: Function index in sync
        run: npm run gen:index && git diff --exit-code sux/src/fns/index.ts

      # Namespace dispatcher (vault/mail/files/calendar/contact) description strings carry
      # worked example calls like verb({action:'x', param}) — these have drifted from the
      # real target tool's inputSchema before (#202, #205, #206) and silently misled callers.
      - name: Dispatcher doc-example params match real schemas
        run: npm run lint:dispatcher-docs

      # Validates the Worker bundles & config are deployable without deploying.
      - name: Build (dry-run deploy)
        run: npx wrangler deploy --dry-run --config sux/wrangler.jsonc

  new-dependency-guard:
    name: New dependency guard
    # Unattended AI-authored PRs (issue-build.yml) are a known target for supply-chain
    # squatting: an LLM can hallucinate a plausible-but-nonexistent package name, and an
    # attacker pre-registers that exact name betting an agent will `npm ci` it sight-unseen
    # (#473). Not urgent enough to hard-fail CI over — a real, legitimate new dependency is
    # the common case — so this just surfaces the diff for a human and leans on the same
    # `hold` label automerge.yml/security-review.yml already treat as a merge-blocking gate,
    # rather than inventing a second label+hold mechanism.
    # pull_request-only: push/merge_group don't carry a stable base ref to diff against.
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # actions/checkout's default depth (1) only has the PR's synthetic merge commit —
      # fetch just the base commit object (not full history) so `git show <base>:package.json`
      # resolves without slowing this down into a full clone.
      - name: Diff package.json dependencies against PR base
        id: diff-deps
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git fetch --depth=1 origin "$BASE_SHA"
          cat > /tmp/diff-deps.cjs <<'EOF'
          const fs = require("fs");
          const { execSync } = require("child_process");
          const baseSha = process.env.BASE_SHA;
          const basePkg = JSON.parse(execSync(`git show ${baseSha}:package.json`).toString());
          const headPkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
          const baseDeps = new Set([
            ...Object.keys(basePkg.dependencies || {}),
            ...Object.keys(basePkg.devDependencies || {}),
          ]);
          const headDeps = [
            ...Object.keys(headPkg.dependencies || {}),
            ...Object.keys(headPkg.devDependencies || {}),
          ];
          const added = headDeps.filter((d) => !baseDeps.has(d));
          const out = process.env.GITHUB_OUTPUT;
          if (added.length === 0) {
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, "No new package.json dependencies in this PR.\n");
            fs.appendFileSync(out, "has_new=false\n");
            process.exit(0);
          }
          const lines = [
            "## :warning: New dependency added — human review required before merge",
            "",
            "This PR adds a package name not present on the base branch. Unattended/AI-authored " +
              "PRs are a known target for supply-chain (typosquat) attacks: an LLM can recommend a " +
              "plausible-sounding package that doesn't exist, and an attacker can pre-register that " +
              "exact name anticipating `npm ci` will install it. Confirm each of these is a real, " +
              "intended dependency before merging:",
            "",
            ...added.map((d) => "- `" + d + "`"),
          ];
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, lines.join("\n") + "\n");
          fs.appendFileSync(out, "has_new=true\n");
          EOF
          node /tmp/diff-deps.cjs

      # Reuse the repo's existing hold convention (docs/design/merge-queue.md) rather than a
      # bespoke gate: applying it here pauses auto-merge the same way a high/critical security
      # finding does, until a human reviews the new name(s) and clears the label. Best-effort —
      # never fail the run over a label-write hiccup (e.g. a fork PR's read-only token).
      - name: Hold PR pending human review of new dependency
        if: steps.diff-deps.outputs.has_new == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr edit "${{ github.event.pull_request.number }}" --add-label hold
