name: Security review (no-dumb-shit bot)

# Every PR gets a focused SECURITY review before it can merge — the standing net for
# exactly the class of mistake that shipped a fork-PR-to-prod hole once. Author-gated
# (public repo: never run for fork/external PRs), and it HARD-BLOCKS the merge on a
# high/critical finding by applying `hold` (which automerge.yml refuses) and failing.
# Inert until ANTHROPIC_API_KEY is set.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: secreview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  security-review:
    # Distinct job id + name so the check-run context is "security-review", NOT the bare
    # "review" that claude.yml's review job produces — branch protection can then require
    # this gate without also requiring (or being unable to disambiguate) that one.
    name: security-review
    # Trusted authors only (public repo). Draft PRs skipped.
    if: >
      github.event.pull_request.draft == false &&
      github.event.sender.type != 'Bot' &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Preflight — need the key
        id: pre
        run: |
          if [ "${{ secrets.ANTHROPIC_API_KEY != '' }}" != "true" ]; then
            echo "ANTHROPIC_API_KEY not set → security review inert"; echo "go=false" >> "$GITHUB_OUTPUT"
          else echo "go=true" >> "$GITHUB_OUTPUT"; fi
      - name: Checkout
        if: steps.pre.outputs.go == 'true'
        uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Claude security review
        if: steps.pre.outputs.go == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Do a SECURITY review of this PR's diff vs the base branch. This repo is a
            PUBLIC Cloudflare Worker + a live autonomous CI/CD pipeline, so weigh:
            secret handling/exposure, auth-gate bypass, SSRF, injection (incl. shell
            injection via `${{ github.event.* }}` in workflows), GitHub Actions abuse
            (pull_request_target + untrusted checkout, missing author gates, over-scoped
            tokens), auto-merge/auto-deploy blast radius, and any autonomous-bot action
            that could touch prod or user data unsafely. Use the repo's /security-review
            skill if present. Post concise inline findings.
            THEN, as your final action, write a machine-readable verdict to the file
            $GITHUB_WORKSPACE/.sec-verdict.json exactly like: {"critical":N,"high":N,"note":"..."}
            (counts of confirmed high/critical issues). If the diff is clean, write zeros.
          claude_args: "--max-turns 14 --model opus --allowedTools Read,Grep,Glob,Bash,Write,Edit"
      - name: Gate — block merge on high/critical
        if: steps.pre.outputs.go == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          # This step only runs when the preflight armed the review (go=true), so the
          # Claude step definitely ran. A missing verdict here means the review did not
          # complete — fail CLOSED (never advisory-pass): apply `hold` and block. Only a
          # genuinely-disarmed preflight (no ANTHROPIC_API_KEY) skips the gate entirely.
          # ADVISORY on infra-failure: the Claude action is not 100% reliable at writing
          # the verdict file. A MISSING verdict means the reviewer did not complete (infra),
          # NOT that the diff is unsafe — so warn + pass, don't hold every PR. The real merge
          # floor is the deterministic gates (strict + gitleaks + trusted-author + features-
          # need-human). We still HARD-BLOCK below when the reviewer DID produce a crit/high
          # verdict. (Trusted-author-only pipeline, so an attacker can't suppress the verdict.)
          if [ ! -f .sec-verdict.json ]; then
            echo "::warning::security review produced no verdict (reviewer did not finish) — advisory pass"
            gh pr comment "$PR" --body "⚠️ no-dumb-shit bot: the security review did not finish (no verdict) — advisory pass, not blocking. Deterministic gates still apply." 2>/dev/null || true
            exit 0; fi
          crit=$(jq -r '.critical // 0' .sec-verdict.json); high=$(jq -r '.high // 0' .sec-verdict.json)
          echo "security verdict: critical=$crit high=$high"
          if [ "${crit:-0}" -gt 0 ] || [ "${high:-0}" -gt 0 ]; then
            gh pr edit "$PR" --add-label hold 2>/dev/null || true
            gh pr comment "$PR" --body "🛑 **no-dumb-shit bot**: found $crit critical / $high high security issue(s). Applied \`hold\` (blocks auto-merge). Resolve or justify, then remove \`hold\`." 2>/dev/null || true
            echo "::error::security review blocked this PR ($crit critical, $high high)"; exit 1
          fi
          echo "✓ no high/critical security findings"
