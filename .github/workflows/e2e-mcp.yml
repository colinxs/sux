name: E2E MCP dispatch (non-required)

# Drives a REAL locally-spun-up Worker (wrangler dev / workerd) over real HTTP
# tools/list + tools/call JSON-RPC — see sux/test/e2e/harness.ts. Deliberately a
# SEPARATE workflow from ci.yml, not a job within it: it needs to boot a live
# Worker (slower, and its "unconfigured vault" tier hits real (failing) network
# calls), which doesn't belong in the fast required check. This repo has no
# GitHub branch-protection rule configured (`gh api repos/.../branches/main/
# protection` → 404), so nothing here is "required" by construction — this
# workflow is intentionally never added to one. Treat a red run here as a signal
# to investigate, not a merge blocker.
#
# The opt-in real-GitHub-vault tier (TEST_OBSIDIAN_VAULT_REPO/TEST_GITHUB_TOKEN)
# is NOT wired here — it needs a maintainer-owned fixture repo + token as repo
# secrets, which is a deliberate follow-up, not this seed. Locally:
#   TEST_OBSIDIAN_VAULT_REPO=<owner/fixture-repo> TEST_GITHUB_TOKEN=$(gh auth token) npm run test:e2e

on:
  push:
    branches-ignore:
      - "gh-readonly-queue/**"
  pull_request:

# GITHUB_TOKEN is load-bearing here now: it clones the public SuxOS/suxlib sibling
# dependency below (sux#1491). Declared explicitly rather than inherited from the
# repo default so that scope is visible and doesn't silently widen later.
permissions:
  contents: read

concurrency:
  group: e2e-mcp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: E2E MCP dispatch (vault + ingest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      # suxlib is PUBLIC today (`gh api repos/SuxOS/suxlib` → private=false), so no
      # App-token mint is needed to read it — the old "private sibling dependency"
      # comment here was stale (sux#1491). GITHUB_TOKEN's default read scope (declared
      # explicitly above) is sufficient. This also unblocks Dependabot: GitHub never
      # exposes Actions secrets (SUX_BOT_APP_ID/SUX_BOT_PRIVATE_KEY) to a
      # Dependabot-triggered run, so the old mint step failed there with an empty app-id.
      #
      # If suxlib becomes PRIVATE again: GITHUB_TOKEN is scoped to this repo only and
      # will 404 on it. Restore the `actions/create-github-app-token` mint this step
      # replaced (see git blame on this file, or sux#1491, for the exact shape) rather
      # than chasing the symptom — an un-annotated GITHUB_TOKEN clone against a private
      # suxlib otherwise fails as an opaque `npm ci` error resolving `file:../suxlib`
      # several steps downstream of the real cause, which is exactly the misdiagnosis
      # that produced the stale comment this replaces.
      #
      # $GITHUB_WORKSPACE is .../work/sux/sux, so ../suxlib lands at .../work/sux/suxlib
      # — exactly where npm's file:../suxlib resolution looks.
      #
      # Pinned to .suxlib-ref (#1149) — see ci.yml's clone step for the rationale.
      - name: Clone suxlib (public sibling dependency)
        env:
          SUXLIB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SUXLIB_REF="$(cat .suxlib-ref)"
          if ! git clone "https://x-access-token:${SUXLIB_TOKEN}@github.com/SuxOS/suxlib.git" ../suxlib; then
            echo "::error::Failed to clone SuxOS/suxlib with GITHUB_TOKEN. suxlib is public today, so this should always succeed — the likely cause is that suxlib has been made PRIVATE, and GITHUB_TOKEN (scoped to this repo only) can no longer see it. Restore the App-token mint this step replaced — see sux#1491."
            exit 1
          fi
          git -C ../suxlib checkout "$SUXLIB_REF"
          npm --prefix ../suxlib ci --omit=dev   # install suxlib's own deps (fflate) so sux's tsc can resolve them through the file: dep

      - name: Install dependencies
        run: npm ci

      - name: E2E MCP dispatch tests
        run: npm run test:e2e
