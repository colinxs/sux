name: Secret scan

# Scans the repo for committed secrets on every push and pull request, and
# FAILS the build if gitleaks detects anything. Guards against a repeat of the
# CapSolver-key-in-repo incident. Allowlist lives in .gitleaks.toml at the root.
on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    # gitleaks-action@v2 posts a PR comment + uploads an artifact on top of the
    # scan; on the default read-only token (and on fork PRs, where GITHUB_TOKEN
    # is read-only regardless of what we request) those API calls crash the job
    # with "Resource not accessible by integration" even on a CLEAN scan. Grant
    # pull-requests: write for same-repo PRs, and disable the comment/upload
    # side-channels so the check's pass/fail is purely the scan result — which
    # also keeps it green on fork PRs where write is never granted.
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so gitleaks scans every commit, not just the tip.
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Explicitly point at the repo-root config (extend + allowlist).
          GITLEAKS_CONFIG: ${{ github.workspace }}/.gitleaks.toml
          # Scan-only: no PR comment / artifact upload. These are the API calls
          # that crash the job on a read-only token (fork PRs, default token).
          GITLEAKS_ENABLE_COMMENTS: false
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false
