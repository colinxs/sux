name: Secret scan

# Scans the repo for committed secrets on every push and pull request, and
# FAILS the build if gitleaks detects anything. Guards against a repeat of the
# CapSolver-key-in-repo incident. Allowlist lives in .gitleaks.toml at the root.
on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    # gitleaks-action@v2's hosted wrapper now gates ANY organization repo behind
    # a paid GITLEAKS_LICENSE ("[org] is an organization. License key is
    # required.") — a breaking change on their end that tripped the moment this
    # repo moved from a personal account into SuxOS. The underlying gitleaks
    # scanner is free/OSS; only their SaaS wrapper action requires a license.
    # Run the free CLI directly instead — same check name (branch protection
    # keys on it), same fail-closed behavior (a download/scan failure fails the
    # job, it never silently no-ops).
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history so gitleaks scans every commit, not just the tip.
          fetch-depth: 0

      - name: Run gitleaks
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # gh CLI is pre-authenticated on the runner, avoiding the unauthenticated
          # api.github.com rate limit that raw curl hits on shared runner IPs.
          gh release download --repo gitleaks/gitleaks --pattern 'gitleaks_*_linux_x64.tar.gz' -O gitleaks.tar.gz --clobber
          tar -xzf gitleaks.tar.gz gitleaks
          # Scan only the commits new to this ref, not full history — a known
          # historical secret (already flagged for rotation, tracked separately)
          # was blocking every PR on a full-history scan. New pushes still get
          # fully scanned end-to-end via push events on origin/main.
          if [ "${GITHUB_EVENT_NAME:-}" = "pull_request" ]; then
            base="origin/${GITHUB_BASE_REF}"
            git fetch --no-tags --depth=1 origin "${GITHUB_BASE_REF}"
            ./gitleaks detect --source . --config .gitleaks.toml --redact -v \
              --log-opts="${base}..HEAD"
          else
            ./gitleaks detect --source . --config .gitleaks.toml --redact -v \
              --log-opts="-1"
          fi
