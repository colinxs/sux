name: Health check

# Daily regression canary (tests) + live smoke check of the deployed Worker. On failure it
# opens (or updates) a tracking issue so a broken deploy or a drifted dependency is noticed
# even when no one pushed that day.
# Reusable workflow: SuxOS/.github/.github/workflows/health.yml

on:
  schedule:
    - cron: "17 9 * * *" # daily at 09:17 UTC
  workflow_dispatch: # allow manual "Run workflow" from the Actions tab

jobs:
  health:
    permissions:
      contents: read
      issues: write
    uses: SuxOS/.github/.github/workflows/health.yml@main
    with:
      smoke-url: "https://suxos.net/mcp"
    secrets: inherit
