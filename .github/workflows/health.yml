name: Health check

# Daily regression canary (tests) + live smoke check of the deployed Worker, plus a
# billing/usage guard (scripts/billing-check.mjs) and a branch-protection guard
# (scripts/branch-protection-check.mjs, #1076) so a spend blowout across GitHub
# Actions minutes / CF Workers requests+neurons / Anthropic API, or main's
# required_status_checks getting silently flipped off, is caught automatically
# instead of only when a human remembers to check. On failure any job opens (or
# updates) a tracking issue so nothing gets missed on a day no one pushed.
# Reusable workflow: SuxOS/.github/.github/workflows/health.yml

on:
  schedule:
    - cron: "17 9 * * *" # daily at 09:17 UTC
  workflow_dispatch: # allow manual "Run workflow" from the Actions tab

jobs:
  health:
    permissions:
      contents: read
      issues: write
    uses: SuxOS/.github/.github/workflows/health.yml@main
    with:
      smoke-url: "https://suxos.net/mcp"
      # package.json has "@suxos/lib": "file:../suxlib" — a private sibling repo. Clone
      # it before `npm ci` (as ci.yml does) so the regression canary can load the suite;
      # without this the daily canary went red with 111 test files failing to import.
      sibling-repos: "suxlib"
    secrets: inherit

  billing:
    name: Billing/usage guard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      # No npm ci — the script has zero external deps (node:url only).
      - name: Billing/usage check
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_BILLING_TOKEN: ${{ secrets.GH_BILLING_TOKEN }}
        run: node scripts/billing-check.mjs

      # A meter over threshold is otherwise invisible on a day no one is watching
      # Actions — same shared upsert used by the hub's own health.yml/audit.yml/
      # pr-watch.yml/budget-governor.yml (and now deploy.yml's failure issue).
      - name: Open or update billing-alert issue on breach
        if: failure()
        uses: SuxOS/.github/.github/actions/upsert-tracking-issue@main
        with:
          github-token: ${{ github.token }}
          title: "sux billing/usage over threshold"
          body: |
            A billing/usage meter breached its threshold.

            - Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Run `node scripts/billing-check.mjs` locally (or with `--json`) for the full report.

  branch-protection:
    name: Branch protection guard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      # No npm ci — the script has zero external deps (node:url only).
      - name: Branch protection check
        env:
          GH_BILLING_TOKEN: ${{ secrets.GH_BILLING_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/branch-protection-check.mjs

      # main's required_status_checks getting flipped off silently is one of the
      # highest-leverage failure modes docs/design/generalized-watchdog-debug.md
      # flags — same shared upsert as the billing job above.
      - name: Open or update branch-protection-drift issue on breach
        if: failure()
        uses: SuxOS/.github/.github/actions/upsert-tracking-issue@main
        with:
          github-token: ${{ github.token }}
          title: "sux main branch protection drift"
          body: |
            main's required_status_checks appears to be missing or misconfigured.

            - Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Run `node scripts/branch-protection-check.mjs --json` locally (with a repo-admin
            token in GH_BILLING_TOKEN) for the full report, and check the repo's Settings →
            Branches → main rule.
