name: Commit lint

# Advisory check of CLAUDE.md's commit rules on every commit in a PR:
#   1. Conventional-Commit subject with a scope — type(scope): summary
#   2. A `Co-Authored-By: Claude ...` trailer.
# Deliberately SOFT: it never fails the build (so it can't fight the autofix bot or
# block a merge) — it posts/updates a single advisory comment listing any violations.
# It's a nudge, not a gate.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: commit-lint-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  commit-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Lint commit subjects + trailers (advisory)
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const pr = context.payload.pull_request;
            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            // type(scope): summary — scope required (CLAUDE.md). Breaking `!` allowed.
            const subjectRe =
              /^(feat|fix|docs|chore|refactor|perf|test|build|ci|revert|security)\([^)]+\)!?: .+/;
            const trailerRe = /^Co-Authored-By:\s*Claude\b/im;

            const problems = [];
            for (const c of commits) {
              const msg = c.commit.message || "";
              const subject = msg.split("\n", 1)[0];
              const sha = c.sha.slice(0, 8);
              // Merge commits carry no conventional subject — skip them.
              if ((c.parents || []).length > 1) continue;
              const issues = [];
              if (!subjectRe.test(subject)) issues.push("subject is not `type(scope): …`");
              if (!trailerRe.test(msg)) issues.push("missing `Co-Authored-By: Claude` trailer");
              if (issues.length) problems.push(`- \`${sha}\` ${subject}\n  - ${issues.join("\n  - ")}`);
            }

            const marker = "<!-- commit-lint -->";
            const body = problems.length
              ? `${marker}\n### Commit-lint (advisory)\nThese commits don't match CLAUDE.md's convention (not blocking):\n\n${problems.join("\n")}\n\n_Conventional-Commit \`type(scope): …\` + a \`Co-Authored-By: Claude …\` trailer._`
              : `${marker}\n### Commit-lint (advisory)\n✓ All commits match the convention.`;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              per_page: 100,
            });
            const existing = comments.find((c) => (c.body || "").includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else if (problems.length) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body,
              });
            }
