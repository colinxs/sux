name: Skill sync

# Keeps the sux skill, its plugin copy, and the generated function reference in
# sync — all derived from the repo itself (sux/src/fns/*.ts), no live server or
# secrets required. `scripts/check-skill-sync.mjs` enforces three invariants:
#   1. sux/FUNCTIONS.md == `npm run docs` output (stale docs fail)
#   2. every function in FUNCTIONS.md is named in .claude/skills/sux/SKILL.md
#   3. plugins/sux-router/skills/ mirrors .claude/skills/ byte-for-byte
#
# check job — gates PRs that touch the skill / functions / script, and runs on
#             the weekly schedule + manual dispatch. Offline, no secrets.
# fix job   — schedule / manual dispatch only: regenerates FUNCTIONS.md and
#             re-mirrors the plugin skill, then opens/refreshes a PR on
#             `bot/docs-update` if anything changed. Needs the repo setting
#             "Allow GitHub Actions to create and approve pull requests"
#             (Settings → Actions → General).

on:
  schedule:
    - cron: '0 14 * * 1' # Mondays 14:00 UTC
  workflow_dispatch:
  pull_request:
    paths:
      - '.claude/skills/**'
      - 'plugins/sux-router/skills/**'
      - 'sux/src/fns/**'
      - 'sux/FUNCTIONS.md'
      - 'sux/scripts/gen-docs.mjs'
      - 'docs/claude-profile-snippet.md'
      - 'scripts/check-skill-sync.mjs'
      - '.github/workflows/skill-sync.yml'

concurrency:
  group: skill-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: SKILL.md / FUNCTIONS.md / plugin mirror
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Check (source-derived, offline)
        run: node scripts/check-skill-sync.mjs --offline

  fix:
    name: Regenerate docs + re-mirror plugin skill
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Regenerate from source
        run: node scripts/check-skill-sync.mjs --write

      - name: Open or refresh PR if anything changed
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if git diff --quiet && [ -z "$(git status --porcelain)" ]; then
            echo "FUNCTIONS.md and plugin skill already up to date." | tee -a "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B bot/docs-update
          git add sux/FUNCTIONS.md plugins/sux-router/skills
          git commit -m "docs: regenerate FUNCTIONS.md + re-mirror plugin skill"
          git push -f origin bot/docs-update
          existing=$(gh pr list --state open --head bot/docs-update --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh pr comment "$existing" --body "Refreshed by the latest Skill sync run."
            echo "Updated existing PR #$existing." | tee -a "$GITHUB_STEP_SUMMARY"
          else
            gh pr create \
              --title "docs: regenerate FUNCTIONS.md + plugin skill mirror" \
              --body "$(printf 'Automated source-derived regeneration by the **Skill sync** workflow:\n\n- `sux/FUNCTIONS.md` — regenerated from `sux/src/fns/*.ts` via `npm run docs`\n- `plugins/sux-router/skills/` — re-mirrored from `.claude/skills/`\n\nIf a newly added function is unmentioned in `.claude/skills/sux/SKILL.md`, the **check** job will fail until the skill prose is updated by hand.\n\nRun: %s/%s/actions/runs/%s' "${{ github.server_url }}" "${{ github.repository }}" "${{ github.run_id }}")"
            echo "Opened new docs PR." | tee -a "$GITHUB_STEP_SUMMARY"
          fi
