name: Issue build

# Builder stage: selects buildable open issues directly (no queued-for-build label gate —
# the separate triage stage and confidence:high/medium/low taxonomy are gone as of the
# three-loop rework), clusters them (n issues -> m PRs, never n->1), fans out one build
# session + PR per cluster. Every PR flows into the normal auto-merge path (automerge.yml
# arms it on green; add `hold` to stop that). Batched schedule + workflow_dispatch drains
# the backlog on demand. Runs on the Claude Pro/Max subscription (CLAUDE_CODE_OAUTH_TOKEN).
# Reusable workflow: SuxOS/.github/.github/workflows/issue-build.yml

on:
  # Batch schedule replaces per-issue triggering, which fanned out parallel opus sessions
  # during fixer bursts (see SuxOS/.github docs/design/budget-and-cadence.md).
  schedule:
    - cron: "*/15 * * * *" # TEMP 15min (bug-drain push), revert in 1h
  workflow_dispatch:
  issues:
    types: [labeled]  # event-driven: fires when fixer files a typed issue; reusable concurrency group serializes runs (no Opus fan-out)

jobs:
  issue-build:
    if: github.event_name != 'issues' || contains(fromJSON('["bug","enhancement","documentation"]'), github.event.label.name)
    # Grant exactly what issue-build.yml needs (default token is read-only → reusable would startup-fail).
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    uses: SuxOS/.github/.github/workflows/issue-build.yml@main
    with:
      model-hint: sonnet  # sonnet only, no Opus escalation (operator directive)
      gates-summary: |
        npm run type-check · npm test · npm run check:node ·
        npm run gen:index (commit the regenerated index.ts) ·
        npx wrangler deploy --dry-run --config sux/wrangler.jsonc
      # Batch size / turns are auto-tuned by the reusable from tier + count (three-loop rework).
    secrets: inherit
