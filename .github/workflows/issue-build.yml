name: Issue build

# Builder stage: selects buildable open issues directly (no queued-for-build label gate —
# the separate triage stage and confidence:high/medium/low taxonomy are gone as of the
# three-loop rework), clusters them (n issues -> m PRs, never n->1), fans out one build
# session + PR per cluster. Every PR flows into the normal auto-merge path (automerge.yml
# arms it on green; add `hold` to stop that). Batched schedule + workflow_dispatch drains
# the backlog on demand. Runs on the Claude Pro/Max subscription (CLAUDE_CODE_OAUTH_TOKEN).
# Reusable workflow: SuxOS/.github/.github/workflows/issue-build.yml

on:
  # Batch schedule replaces per-issue triggering, which fanned out parallel opus sessions
  # during fixer bursts (see SuxOS/.github docs/design/budget-and-cadence.md).
  schedule:
    - cron: "3 * * * *" # hourly (reverted from temp 15min bug-drain push)
  workflow_dispatch:
  issues:
    types: [labeled]  # event-driven: fires when fixer files a typed issue; reusable concurrency group serializes runs (no Opus fan-out)

jobs:
  issue-build:
    if: github.event_name != 'issues' || contains(fromJSON('["bug","enhancement","documentation"]'), github.event.label.name)
    # Grant exactly what issue-build.yml needs (default token is read-only → reusable would startup-fail).
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    uses: SuxOS/.github/.github/workflows/issue-build.yml@main
    with:
      model-hint: sonnet  # sonnet only, no Opus escalation (operator directive)
      # STEADY-STATE knobs (operator comment on SuxOS/.github#644, 2026-07-22 wrap):
      # backlog drained to a trickle, so the v4-push wide-batch tuning (12/20/2) reverts
      # to 8/14/1. One lane makes the strict-mode sibling-invalidation waste (out-of-date
      # → update → full re-CI per merge) and the cross-PR DIRTY-conflict class structurally
      # impossible, at zero practical cost at trickle backlog — efficiency (CI minutes /
      # tokens per landed issue) is strictly best at 1 lane. Wall-clock parallelism only
      # matters during hot drains, which may temporarily re-raise these (as #1237 did).
      #
      # 2026-07-24 HOT-DRAIN (operator: ~90 open issues here, 70% of the org backlog; drain
      # it quickly, but "we hate stuck/held builds even more than wasted work"). So widen M
      # (max-issues) ONLY — up to the operator-proven v4-push value of 12 — and hold N
      # (parallel-batches) at 1. M-up processes more issues per hourly run *sequentially
      # within the lane*, so it never creates coincident-sibling PRs; N>1 is the knob that
      # manufactures DIRTY conflicts → held builds, so it stays at 1. effort-budget scales
      # with M (14→22, ~constant per-issue). REVERT to 8/14/1 once this backlog is < ~20.
      max-issues: 12
      effort-budget: 22
      parallel-batches: 1
      needs-suxlib: true  # package.json depends on "@suxos/lib": "file:../suxlib" (see CLAUDE.md's Known gotcha) — the reusable clones it before npm ci when this is set
      gates-summary: |
        npm run type-check · npm test · npm run check:node ·
        npm run gen:index (commit the regenerated index.ts) ·
        npx wrangler deploy --dry-run --config sux/wrangler.jsonc
      # Batch size / turns are auto-tuned by the reusable from tier + count (three-loop rework).
    secrets: inherit
