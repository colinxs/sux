name: Auto-merge

# Enable GitHub NATIVE auto-merge on eligible PRs. Once the MERGE QUEUE is enabled on main (as
# of this writing it is BUILT but NOT YET ENABLED — see docs/design/merge-queue.md), `gh pr
# merge --auto` no longer merges the PR directly — it ADDS the PR to the merge queue once it's
# eligible (approvals/labels satisfied). GitHub then forms a merge group, runs the required
# checks on the queue's speculative `gh-readonly-queue/main/...` ref, and merges the batch — so
# nothing red ever reaches the auto-deploying main, and N queued PRs collapse into ONE push to
# main (one deploy) instead of N racing rebase+merge+deploy cycles. This job only ENQUEUES; it
# never force-merges. The merge METHOD (squash) is dictated by the queue config, not by the
# `--squash` flag below (which is kept only so this still works if the queue is ever turned
# off). Until the queue is enabled, `--auto` merges directly the moment CI is green AND the PR
# is up to date with main — pr-drain.yml's REBASE-BEHIND step keeps eligible PRs up to date in
# the meantime, since the queue's own rebasing isn't live yet.
#
# Eligibility (the safe, hands-off subset):
#   - a conventional-commit "safe type" title: fix|security|perf|refactor|chore|docs|test|build|ci|revert
#     OR an explicit eligible label: automerge | bug | security | chore-safe
#   - AND not a draft, not labelled `hold`, not labelled `feature`, not a breaking `!` title.
# Net-new features (`feat:`) and anything labelled `feature`/`hold` are left for a human.
#
# Uses pull_request_target (base-repo context, write token) but never checks out PR
# code — it only reads the event payload and calls the API, so there is no
# untrusted-code-execution surface.
#
# Auto-merge is ENABLED with a GitHub App token (not GITHUB_TOKEN): GitHub suppresses
# workflow runs for pushes attributed to GITHUB_TOKEN, so a GITHUB_TOKEN-enabled
# auto-merge produced a merge commit on main that fired NEITHER Deploy nor CI. The App
# token makes the merge push look like a normal user push, so deploy.yml's on:push fires
# unchanged. See https://docs.github.com/actions/using-workflows/triggering-a-workflow
#
# SAFETY NOTE: the safe-to-auto-merge property depends on things this workflow cannot verify
# at runtime — the required checks (Type-check & build, security-review, gitleaks, npm audit &
# SBOM) being required on main, "Allow auto-merge" being enabled, and the merge queue being
# enabled with those same checks required on the merge_group. If any is off, this degrades to a
# no-op (nothing gets enqueued/merged), never to an unguarded merge. The runtime assert below
# additionally refuses to arm unless the security gates are required (classic protection OR ruleset).

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize, labeled, unlabeled, edited]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: automerge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  enable-automerge:
    runs-on: ubuntu-latest
    # PUBLIC REPO: only auto-merge PRs from trusted authors. A fork/external PR
    # (author_association CONTRIBUTOR/NONE/FIRST_TIME_*) can NEVER auto-merge — else a
    # malicious `fix:`-titled PR would auto-deploy to production on green CI.
    # ARMING PREREQUISITE for self-improve auto-merge: a HIGH-confidence self-improve PR is
    # authored by the SUX_BOT App (author_association falls outside OWNER/MEMBER/COLLABORATOR),
    # so also admit a Bot-authored PR that carries the `self-improve` label — that label is
    # addable only by trusted write access, and the eligibility step below still requires the
    # `automerge` label (which the loop attaches ONLY on the armed HIGH path), so an UNarmed
    # self-improve PR entering here is still made ineligible and never merges.
    if: >
      github.event.pull_request.state == 'open' &&
      (
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association) ||
        (github.event.pull_request.user.type == 'Bot' && contains(github.event.pull_request.labels.*.name, 'self-improve'))
      )
    steps:
      - name: Mint app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.SUX_BOT_APP_ID }}
          private-key: ${{ secrets.SUX_BOT_PRIVATE_KEY }}

      # Protection assertion. Native auto-merge completes the instant main's REQUIRED status
      # checks go green — GitHub never waits for a check that isn't required. So the security
      # net (security-review's high/crit `hold`, npm audit) is only real if branch
      # protection actually REQUIRES those contexts; otherwise the fast deterministic CI goes
      # green and the merge fires while the slow opus review is still running (the race). We
      # therefore refuse to enable auto-merge unless every required gate below is present in
      # main's required_status_checks — enabling auto-merge only when GitHub itself will
      # withhold the merge until those gates report. If the gates aren't required, this
      # degrades to a no-op and the PR falls back to a human merge, never an unguarded one.
      #
      # A fail-closed assert that ALSO trips on an unreadable API response is a self-inflicted
      # DoS: one token-perm blip would jam EVERY auto-merge. So distinguish the two:
      #   • API read SUCCEEDS but a required gate is missing → ::error:: + exit non-zero
      #     (fail closed, LOUD) — restore the missing context on main to re-arm auto-merge.
      #   • API read FAILS (403 / 404 / network — can't DETERMINE protection state) →
      #     ::warning:: + continue: a perms blip must not block the whole merge queue, and
      #     GitHub still won't complete the merge if the checks are actually required.
      - name: Assert main branch protection requires the security gates
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          # The check-run contexts that must gate main before auto-merge is safe. Each is a
          # job `name`: ci.yml "Type-check & build", security-review.yml "security-review",
          # audit.yml "npm audit & SBOM". Secret scanning is now GitHub's native
          # secret-scanning + push-protection (repo Settings → Security), not a status
          # check — it blocks a leaked secret from ever being pushed, so it doesn't need
          # a REQUIRED_GATES entry here. audit runs unconditionally; security-review runs
          # for the trusted, non-draft PRs this job ever auto-merges, so requiring it
          # can't wedge an eligible PR on a skipped check.
          REQUIRED_GATES: |
            Type-check & build
            security-review
            npm audit & SBOM
        run: |
          set -uo pipefail
          # Gather the required check contexts main enforces from BOTH governance surfaces:
          #   • classic branch protection → repos/{repo}/branches/main/protection
          #   • repository rulesets       → repos/{repo}/rules/branches/main (union of active rulesets)
          # The merge queue is typically enabled via a RULESET, whose required checks do NOT appear
          # in the classic-protection payload. Reading only classic would then see "no gates" on a
          # ruleset-gated repo and jam every auto-merge — so union both; a gate need only be present
          # in EITHER. Readable if EITHER endpoint responds; only fail-closed on a definite miss.
          read_ok=false
          required=""
          if prot=$(gh api "repos/${GITHUB_REPOSITORY}/branches/main/protection" 2>/dev/null); then
            read_ok=true
            required="$required
          $(printf '%s' "$prot" | jq -r '[(.required_status_checks.contexts // [])[], (.required_status_checks.checks // [])[].context] | .[]')"
          fi
          if rules=$(gh api "repos/${GITHUB_REPOSITORY}/rules/branches/main" 2>/dev/null); then
            read_ok=true
            required="$required
          $(printf '%s' "$rules" | jq -r '[.[] | select(.type == "required_status_checks") | .parameters.required_status_checks[]?.context] | .[]')"
          fi
          if [ "$read_ok" != "true" ]; then
            echo "::warning::could not READ main branch protection OR rulesets (token perms / 404 / network) — cannot determine protection state, so continuing WITHOUT blocking; a token/API blip must not jam the queue. If the checks are required, GitHub still gates the actual merge."
          else
            required=$(printf '%s\n' "$required" | sed 's/^ *//' | grep -v '^$' | sort -u)
            missing=""
            while IFS= read -r gate; do
              [ -z "$gate" ] && continue
              if ! printf '%s\n' "$required" | grep -qxF "$gate"; then
                missing="${missing:+$missing, }$gate"
              fi
            done <<< "$REQUIRED_GATES"
            if [ -n "$missing" ]; then
              echo "::error::main does NOT require these gates (checked classic protection + rulesets): $missing — refusing to enable auto-merge (they'd stay advisory and lose the race). Add them to main's required_status_checks (branch protection or the merge-queue ruleset) to re-arm auto-merge."
              exit 1
            fi
            echo "branch protection/ruleset OK: main requires all security gates"
          fi

      - name: Decide eligibility and enable auto-merge
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUM: ${{ github.event.pull_request.number }}
          TITLE: ${{ github.event.pull_request.title }}
          DRAFT: ${{ github.event.pull_request.draft }}
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          set -euo pipefail
          echo "PR #$PR_NUM  title=$TITLE  draft=$DRAFT  labels=$LABELS"

          has_label() { echo ",$LABELS," | grep -qi ",$1,"; }

          # A PR can flip from eligible → ineligible after auto-merge was already enabled
          # (relabeled `hold`/`feature`, or a `fix:` title edited to `feat:`). Guard that
          # TOCTOU: on any ineligible path, DISABLE any auto-merge left standing, don't
          # just skip. --disable-auto is a no-op when auto-merge isn't set.
          ineligible() {
            echo "$1 → not auto-merge-eligible; disabling any pending auto-merge"
            gh pr merge --disable-auto "$PR_URL" 2>/dev/null || true
            exit 0
          }

          # Hard blocks first.
          if [ "$DRAFT" = "true" ]; then ineligible "draft"; fi
          if has_label hold;    then ineligible "hold label"; fi
          if has_label feature; then ineligible "feature label (needs a human)"; fi
          # Breaking change marker in a conventional title (e.g. 'fix!:') → needs a human.
          if printf '%s' "$TITLE" | grep -qiE '^[a-z]+(\([^)]*\))?!:'; then
            ineligible "breaking-change (!) title"; fi

          eligible=false
          # Label-based eligibility.
          for l in automerge bug security chore-safe; do
            if has_label "$l"; then eligible=true; fi
          done
          # Conventional-commit safe-type title (excludes feat:).
          if printf '%s' "$TITLE" | grep -qiE '^(fix|security|perf|refactor|chore|docs|test|build|ci|revert)(\([^)]*\))?:'; then
            eligible=true; fi

          if [ "$eligible" != "true" ]; then
            ineligible "feature or unlabeled PR"; fi

          # With the queue enabled this ENQUEUES the PR (adds it to the merge queue) once it's
          # eligible; GitHub merges the batch on the queue's terms. The method is the queue's
          # (squash); the --squash flag is a no-op under the queue but keeps this correct if the
          # queue is ever turned off. See docs/design/merge-queue.md.
          echo "eligible → enabling native auto-merge / adding to the merge queue (squash)"
          gh pr merge --auto --squash "$PR_URL" || {
            echo "::warning::could not enable auto-merge / enqueue (branch protection unmet or already merging/queued)"; exit 0; }
          # Visibility: reflect the decision with the automerge label (best-effort).
          gh pr edit "$PR_URL" --add-label automerge 2>/dev/null || true
