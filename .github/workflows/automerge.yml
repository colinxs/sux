name: Auto-merge

# Enable GitHub NATIVE auto-merge on eligible PRs. GitHub then merges the PR by
# itself the moment branch protection is satisfied (the required "Type-check & build"
# check is green) — so nothing red ever reaches the auto-deploying main. This job
# only *enables* auto-merge; it never force-merges. Merge method: squash.
#
# Eligibility (the safe, hands-off subset):
#   - a conventional-commit "safe type" title: fix|security|perf|refactor|chore|docs|test|build|ci|revert
#     OR an explicit eligible label: automerge | bug | security | chore-safe
#   - AND not a draft, not labelled `hold`, not labelled `feature`, not a breaking `!` title.
# Net-new features (`feat:`) and anything labelled `feature`/`hold` are left for a human.
#
# Uses pull_request_target (base-repo context, write token) but never checks out PR
# code — it only reads the event payload and calls the API, so there is no
# untrusted-code-execution surface.
#
# Auto-merge is ENABLED with a GitHub App token (not GITHUB_TOKEN): GitHub suppresses
# workflow runs for pushes attributed to GITHUB_TOKEN, so a GITHUB_TOKEN-enabled
# auto-merge produced a merge commit on main that fired NEITHER Deploy nor CI. The App
# token makes the merge push look like a normal user push, so deploy.yml's on:push fires
# unchanged. See https://docs.github.com/actions/using-workflows/triggering-a-workflow
#
# SAFETY NOTE: the safe-to-auto-merge property depends on two things this workflow
# cannot verify at runtime — branch protection requiring the "Type-check & build" check,
# and "Allow auto-merge" being enabled on the repo. If either is off, this degrades to
# a no-op (auto-merge can't be enabled), never to an unguarded merge.

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize, labeled, unlabeled, edited]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: automerge-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  enable-automerge:
    runs-on: ubuntu-latest
    # PUBLIC REPO: only auto-merge PRs from trusted authors. A fork/external PR
    # (author_association CONTRIBUTOR/NONE/FIRST_TIME_*) can NEVER auto-merge — else a
    # malicious `fix:`-titled PR would auto-deploy to production on green CI.
    if: >
      github.event.pull_request.state == 'open' &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association)
    steps:
      - name: Mint app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.SUX_BOT_APP_ID }}
          private-key: ${{ secrets.SUX_BOT_PRIVATE_KEY }}

      - name: Decide eligibility and enable auto-merge
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUM: ${{ github.event.pull_request.number }}
          TITLE: ${{ github.event.pull_request.title }}
          DRAFT: ${{ github.event.pull_request.draft }}
          LABELS: ${{ join(github.event.pull_request.labels.*.name, ',') }}
        run: |
          set -euo pipefail
          echo "PR #$PR_NUM  title=$TITLE  draft=$DRAFT  labels=$LABELS"

          has_label() { echo ",$LABELS," | grep -qi ",$1,"; }

          # A PR can flip from eligible → ineligible after auto-merge was already enabled
          # (relabeled `hold`/`feature`, or a `fix:` title edited to `feat:`). Guard that
          # TOCTOU: on any ineligible path, DISABLE any auto-merge left standing, don't
          # just skip. --disable-auto is a no-op when auto-merge isn't set.
          ineligible() {
            echo "$1 → not auto-merge-eligible; disabling any pending auto-merge"
            gh pr merge --disable-auto "$PR_URL" 2>/dev/null || true
            exit 0
          }

          # Hard blocks first.
          if [ "$DRAFT" = "true" ]; then ineligible "draft"; fi
          if has_label hold;    then ineligible "hold label"; fi
          if has_label feature; then ineligible "feature label (needs a human)"; fi
          # Breaking change marker in a conventional title (e.g. 'fix!:') → needs a human.
          if printf '%s' "$TITLE" | grep -qiE '^[a-z]+(\([^)]*\))?!:'; then
            ineligible "breaking-change (!) title"; fi

          eligible=false
          # Label-based eligibility.
          for l in automerge bug security chore-safe; do
            if has_label "$l"; then eligible=true; fi
          done
          # Conventional-commit safe-type title (excludes feat:).
          if printf '%s' "$TITLE" | grep -qiE '^(fix|security|perf|refactor|chore|docs|test|build|ci|revert)(\([^)]*\))?:'; then
            eligible=true; fi

          if [ "$eligible" != "true" ]; then
            ineligible "feature or unlabeled PR"; fi

          echo "eligible → enabling native auto-merge (squash)"
          gh pr merge --auto --squash "$PR_URL" || {
            echo "::warning::could not enable auto-merge (branch protection unmet or already merging)"; exit 0; }
          # Visibility: reflect the decision with the automerge label (best-effort).
          gh pr edit "$PR_URL" --add-label automerge 2>/dev/null || true
