# Deploy the sux Cloudflare Worker after tests pass.
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   — Cloudflare API token used by wrangler to deploy.
#   CLOUDFLARE_ACCOUNT_ID  — the Cloudflare account ID that owns the Worker.
#
# Creating the CLOUDFLARE_API_TOKEN:
#   1. Cloudflare dashboard → My Profile → API Tokens → Create Token.
#   2. Use the "Edit Cloudflare Workers" template, OR a Custom token with the
#      permission: Account → Workers Scripts → Edit  (Workers Scripts:Edit).
#      Add Account → Workers KV Storage → Edit if you also manage KV from CI.
#   3. Scope it to the account that owns the Worker, create, and copy the token
#      into the CLOUDFLARE_API_TOKEN secret. Find the account ID on the dashboard
#      Workers & Pages overview (or `wrangler whoami`) → CLOUDFLARE_ACCOUNT_ID.
name: Deploy

on:
  push:
    branches: [main]  # only the branch-protected, CI-gated main auto-deploys to prod
  workflow_dispatch: # allow manual "Run workflow" from the Actions tab

permissions:
  contents: read
  issues: write # open/update a tracking issue when a prod deploy fails

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      # suxlib is PUBLIC today (`gh api repos/SuxOS/suxlib` → private=false), so no
      # App-token mint is needed to read it — the old "private sibling dependency"
      # comment here was stale (sux#1491). GITHUB_TOKEN's default read scope (declared
      # explicitly above) is sufficient. This also unblocks Dependabot: GitHub never
      # exposes Actions secrets (SUX_BOT_APP_ID/SUX_BOT_PRIVATE_KEY) to a
      # Dependabot-triggered run, so the old mint step failed there with an empty app-id.
      #
      # If suxlib becomes PRIVATE again: GITHUB_TOKEN is scoped to this repo only and
      # will 404 on it. Restore the `actions/create-github-app-token` mint this step
      # replaced (see git blame on this file, or sux#1491, for the exact shape) rather
      # than chasing the symptom — an un-annotated GITHUB_TOKEN clone against a private
      # suxlib otherwise fails as an opaque `npm ci` error resolving `file:../suxlib`
      # several steps downstream of the real cause, which is exactly the misdiagnosis
      # that produced the stale comment this replaces.
      #
      # $GITHUB_WORKSPACE is .../work/sux/sux, so ../suxlib lands at .../work/sux/suxlib
      # — exactly where npm's file:../suxlib resolution looks.
      #
      # Pinned to .suxlib-ref (#1149) — see ci.yml's clone step for the rationale.
      - name: Clone suxlib (public sibling dependency)
        env:
          SUXLIB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SUXLIB_REF="$(cat .suxlib-ref)"
          if ! git clone "https://x-access-token:${SUXLIB_TOKEN}@github.com/SuxOS/suxlib.git" ../suxlib; then
            echo "::error::Failed to clone SuxOS/suxlib with GITHUB_TOKEN. suxlib is public today, so this should always succeed — the likely cause is that suxlib has been made PRIVATE, and GITHUB_TOKEN (scoped to this repo only) can no longer see it. Restore the App-token mint this step replaced — see sux#1491."
            exit 1
          fi
          git -C ../suxlib checkout "$SUXLIB_REF"
          npm --prefix ../suxlib ci --omit=dev   # install suxlib's own deps (fflate) so sux's tsc can resolve them through the file: dep

      - name: Install dependencies
        run: npm ci

      # Gate the deploy on the same floor as ci.yml: type-check, tests, node-blob
      # sync, and fn-index sync must all pass before wrangler ships anything. The
      # last two matter for workflow_dispatch — a manual deploy from a stale/dirty
      # ref would otherwise skip them and ship generated-artifact drift to prod.
      - name: Type-check
        run: npm run type-check

      - name: Test
        run: npm test

      - name: Node deploy blob in sync
        run: npm run check:node

      - name: Function index in sync
        run: npm run gen:index && git diff --exit-code sux/src/fns/index.ts

      # Stamp package.json's version into the deployed Worker (#1238) — --var overrides
      # wrangler.jsonc's own vars, so production becomes queryable (selftest surfaces it)
      # without hand-editing wrangler.jsonc on every bump.
      - name: Resolve version to stamp
        id: version
        run: echo "value=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      # Deploys code + wrangler.jsonc vars (including the Cron Trigger). Does NOT
      # touch secrets (KAGI_API_KEY, GITHUB_CLIENT_ID/SECRET, COOKIE_ENCRYPTION_KEY,
      # ALLOWED_GITHUB_LOGIN, KROGER_CLIENT_ID/SECRET) — manage those with
      # `wrangler secret put`.
      - name: Deploy
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config sux/wrangler.jsonc --var SUX_VERSION:${{ steps.version.outputs.value }}

      # A failed prod deploy is otherwise invisible: a merged fix silently never
      # ships. On any failure above (build gate or wrangler deploy), open a fresh
      # tracking issue or update the existing open one — same shared upsert used
      # by the hub's own health.yml/audit.yml/pr-watch.yml/budget-governor.yml.
      - name: Open or update deploy-failure issue on failure
        if: failure()
        uses: SuxOS/.github/.github/actions/upsert-tracking-issue@main
        with:
          github-token: ${{ github.token }}
          title: "sux production deploy failed"
          body: |
            The production deploy failed.

            - Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            - Commit: ${{ github.sha }}

            A merged change did NOT reach production. This is either a red build
            gate (type-check/tests) or a wrangler deploy error. See the run logs above.
