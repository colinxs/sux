name: Claude

# Two hands-off assists (both inert until ANTHROPIC_API_KEY is set):
#   1. @claude — mention the bot in any PR/issue comment or review and it responds
#      (fix this, rebase, explain, address the review, etc.).
#   2. Review on open — a `/code-review` pass on every non-draft PR, so assumptions
#      get checked and obvious issues get flagged before it merges.
# Cost-bounded: concurrency cancel-in-progress, --max-turns, a review only on
# opened/ready (not every push). Features still merge only by a human's hand.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [opened, ready_for_review]

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

concurrency:
  group: claude-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: true

jobs:
  mention:
    # Fire only when a human (@claude) asks — never on the bot's own comments.
    if: >
      github.event.sender.type != 'Bot' && (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
      )
    runs-on: ubuntu-latest
    steps:
      - name: Preflight — need the key
        id: pre
        run: |
          if [ "${{ secrets.ANTHROPIC_API_KEY != '' }}" != "true" ]; then
            echo "ANTHROPIC_API_KEY not set → inert"; echo "go=false" >> "$GITHUB_OUTPUT"
          else echo "go=true" >> "$GITHUB_OUTPUT"; fi
      - name: Checkout
        if: steps.pre.outputs.go == 'true'
        uses: actions/checkout@v4
      - name: Claude respond
        if: steps.pre.outputs.go == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude"
          claude_args: "--max-turns 12 --model sonnet"

  review:
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      github.event.sender.type != 'Bot'
    runs-on: ubuntu-latest
    steps:
      - name: Preflight — need the key
        id: pre
        run: |
          if [ "${{ secrets.ANTHROPIC_API_KEY != '' }}" != "true" ]; then
            echo "ANTHROPIC_API_KEY not set → inert"; echo "go=false" >> "$GITHUB_OUTPUT"
          else echo "go=true" >> "$GITHUB_OUTPUT"; fi
      - name: Checkout
        if: steps.pre.outputs.go == 'true'
        uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Claude review
        if: steps.pre.outputs.go == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review this PR for correctness bugs and reuse/simplification/efficiency
            issues (the repo has a /code-review skill — use it). Post concise, concrete
            inline findings; don't rewrite the PR. If it looks clean, say so in one line.
          claude_args: "--max-turns 12 --model opus"
