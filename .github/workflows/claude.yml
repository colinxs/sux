name: Claude

# Two hands-off assists (both inert until CLAUDE_CODE_OAUTH_TOKEN is set (subscription, via
# claude setup-token)):
#   1. @claude — mention the bot in any PR/issue comment or review and it responds.
#   2. Review on open — a review pass on every non-draft PR.
# Cost-bounded: concurrency cancel-in-progress, --max-turns, review only on opened/ready.
# Reusable workflow: SuxOS/.github/.github/workflows/claude.yml

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [opened, ready_for_review]

jobs:
  claude:
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    uses: SuxOS/.github/.github/workflows/claude.yml@main
    secrets: inherit
