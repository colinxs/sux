name: Audit & SBOM

# Dependency vulnerability audit + Software Bill of Materials generation. Fails the build
# on genuine high/critical advisories (stays advisory on a registry/network blip), uploads
# a CycloneDX SBOM, and opens/updates a tracking issue on a genuine failure. Also runs on
# merge_group so the "npm audit & SBOM" required check reports on the queue's speculative
# ref; push excludes gh-readonly-queue/** to avoid colliding with that run.
# Reusable workflow: SuxOS/.github/.github/workflows/audit.yml — see its design doc.

on:
  push:
    branches-ignore:
      - "gh-readonly-queue/**"
  pull_request:
  merge_group:
  schedule:
    - cron: "0 7 * * 1"

jobs:
  audit:
    permissions:
      contents: read
      issues: write
    uses: SuxOS/.github/.github/workflows/audit.yml@main
    secrets: inherit
